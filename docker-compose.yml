services:
  postgres:
    image: postgres:16-alpine
    container_name: clean_arch_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clean_arch_dev
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f"
      - "-c"
      - "max_wal_senders=10"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../lesson-24-postgres-pitr/runtime/archive:/wal_archive

volumes:
  postgres_data:
